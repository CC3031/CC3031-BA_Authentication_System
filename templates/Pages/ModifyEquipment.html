<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../static/ModifyEquipment.css">
<title>Modify Equipment</title>

<script>
function loadEquipment() {
    let select = document.getElementById("equipment");
    let selectedOption = select.options[select.selectedIndex];

    if (select.value !== "0") {
        let text = selectedOption.text;

        // Split name and price
        let name = text.split(" - $")[0];
        let price = select.value;

        document.getElementById("name").value = name;
        document.getElementById("price").value = price;
    }
}

function updateEquipment() {
    let select = document.getElementById("equipment");
    let selectedIndex = select.selectedIndex;

    let newName = document.getElementById("name").value;
    let newPrice = document.getElementById("price").value;

    if (selectedIndex === 0) {
        alert("Select equipment first.");
        return;
    }

    // Update dropdown option
    select.options[selectedIndex].text = newName + " - $" + newPrice + "/day";
    select.options[selectedIndex].value = newPrice;

    alert("Equipment updated!");
}
</script>

</head>
<body>

<h1>Modify Equipment</h1>

<label for="equipment">Select Equipment:</label>
<select id="equipment" onchange="loadEquipment()">
    <option value="0">-- Select Equipment --</option>
    <option value="15">Power Drill - $15/day</option>
    <option value="20">Impact Driver - $20/day</option>
    <option value="25">Circular Saw - $25/day</option>
    <option value="18">Jigsaw - $18/day</option>
    <option value="22">Angle Grinder - $22/day</option>
    <option value="30">Hammer Drill - $30/day</option>
    <option value="12">Heat Gun - $12/day</option>
    <option value="16">Electric Sander - $16/day</option>
    <option value="28">Nail Gun - $28/day</option>
    <option value="35">Paint Sprayer - $35/day</option>
</select>

<br><br>

<label>Equipment Name:</label><br>
<input type="text" id="name"><br><br>

<label>Price per Day ($):</label><br>
<input type="number" id="price"><br><br>

<button onclick="updateEquipment()">Update Equipment</button>

</body>
</html>
